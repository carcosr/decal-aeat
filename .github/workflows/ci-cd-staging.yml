name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          # npm run test --if-present # Descomentar si se añaden tests en el futuro

      - name: Zip artifact for deployment
        # Comprimimos el código compilado (dist) y los archivos necesarios
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Development"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: "Deploy to Azure WebApp"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "aeat-decal-api-service"
          slot-name: "staging"
          publish-profile: ${{ secrets.STAGING.AZURE_WEBAPP_PUBLISH_PROFILE }}
